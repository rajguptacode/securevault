<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVault</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://api.github.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.github.com; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="Referrer-Policy" content="no-referrer">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()">
<meta name="robots" content="noindex, nofollow">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#08080e;--bg2:#101018;--bg3:#181824;--bg4:#202030;--bg5:#282840;
--border:#2a2020;--border2:#3d2e1e;
--text:#f0e8e0;--text2:#a89888;--text3:#685848;--text4:#483828;
--accent:#e87820;--accent2:#ffaa40;--accent3:#c06010;
--success:#00e0c8;--danger:#ff5858;--warn:#ffb830;
--glow:rgba(232,120,32,.12);--glow2:rgba(255,170,64,.08);
}
html{font-size:14px}
body{font-family:'Inter',-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;background-image:radial-gradient(circle at 20% 80%,rgba(232,120,32,.02) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(255,170,64,.02) 0%,transparent 50%)}

/* ===== LOCK SCREEN ===== */
#lock,#cloud-setup{position:fixed;inset:0;z-index:9999;background:#04040a;display:flex;align-items:center;justify-content:center;overflow:hidden}
#lock.hidden,#cloud-setup.hidden{opacity:0;visibility:hidden;pointer-events:none;transition:all .7s cubic-bezier(.4,0,.2,1)}

/* Animated background */
.lock-bg{position:absolute;inset:0}
.lock-bg::before{content:'';position:absolute;inset:-50%;background:conic-gradient(from 0deg at 50% 50%,transparent 0deg,rgba(232,120,32,.04) 60deg,transparent 120deg,rgba(255,170,64,.03) 180deg,transparent 240deg,rgba(232,120,32,.04) 300deg,transparent 360deg);animation:lockRotate 25s linear infinite}
@keyframes lockRotate{to{transform:rotate(360deg)}}
.lock-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(232,120,32,.08) 0%,transparent 60%)}

/* Grid overlay */
.lock-grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(232,120,32,.015) 1px,transparent 1px),
  linear-gradient(90deg,rgba(232,120,32,.015) 1px,transparent 1px);
  background-size:60px 60px;animation:gridShift 25s linear infinite;opacity:.6}
@keyframes gridShift{to{transform:translate(60px,60px)}}

/* Particles */
.lock-particles{position:absolute;inset:0;overflow:hidden}
.lp{position:absolute;border-radius:50%;animation:lpFloat linear infinite}
@keyframes lpFloat{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:.8}90%{opacity:.8}100%{opacity:0;transform:translateY(-10vh) scale(1.2)}}

/* Floating orbs */
.lock-orb{position:absolute;border-radius:50%;filter:blur(60px);animation:orbFloat 8s ease-in-out infinite alternate}
@keyframes orbFloat{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,-20px) scale(1.1)}}

/* Content */
.lock-content{position:relative;z-index:2;text-align:center;width:100%;max-width:380px;padding:0 20px}

/* Lock icon */
.lock-icon-wrap{width:80px;height:80px;margin:0 auto 32px;position:relative}
.lock-icon-wrap::before{content:'';position:absolute;inset:-16px;border:1px solid rgba(232,120,32,.12);border-radius:50%;animation:iconRing 3s ease-in-out infinite}
.lock-icon-wrap::after{content:'';position:absolute;inset:-8px;border:1px solid rgba(255,170,64,.08);border-radius:50%;animation:iconRing 3s ease-in-out infinite .5s}
@keyframes iconRing{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.2);opacity:.7}}
.lock-icon-wrap{animation:iconPulse 4s ease-in-out infinite}
@keyframes iconPulse{0%,100%{filter:drop-shadow(0 0 15px rgba(232,120,32,.2))}50%{filter:drop-shadow(0 0 30px rgba(232,120,32,.5))}}
.lock-icon-wrap svg{width:100%;height:100%;filter:drop-shadow(0 0 25px rgba(232,120,32,.4))}

/* Title */
.lock-title{font-size:11px;text-transform:uppercase;letter-spacing:6px;color:var(--text3);margin-bottom:8px;opacity:0;animation:lockFadeUp .6s ease .3s forwards}
.lock-subtitle{font-size:22px;font-weight:700;color:var(--text);margin-bottom:36px;opacity:0;animation:lockFadeUp .6s ease .5s forwards}
@keyframes lockFadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}

/* Form fields */
.lock-field{position:relative;margin-bottom:16px;opacity:0;animation:lockFadeUp .5s ease forwards}
.lock-field:nth-child(1){animation-delay:.6s}
.lock-field:nth-child(2){animation-delay:.75s}
.lock-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:6px;text-align:left}
.lock-field input{width:100%;padding:14px 16px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.02);color:var(--text);outline:none;transition:all .3s;backdrop-filter:blur(20px)}
.lock-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,120,32,.12),0 0 30px rgba(232,120,32,.1)}
.lock-field input::placeholder{color:var(--text4)}
.lock-field .field-icon{position:absolute;right:14px;top:38px;color:var(--text4);pointer-events:none}

/* Submit button */
.lock-submit{width:100%;padding:14px;font-size:14px;font-weight:600;letter-spacing:1px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent3),var(--accent));color:#fff;cursor:pointer;transition:all .3s;margin-top:8px;opacity:0;animation:lockFadeUp .5s ease .9s forwards;position:relative;overflow:hidden}
.lock-submit::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .3s}
.lock-submit:hover::before{opacity:1}
.lock-submit:hover{transform:translateY(-2px);box-shadow:0 8px 35px rgba(232,120,32,.4)}
.lock-submit:active{transform:translateY(0)}

/* Status messages */
.lock-msg{margin-top:16px;font-size:12px;min-height:18px;opacity:0;animation:lockFadeUp .4s ease 1s forwards}
.lock-msg.error{color:var(--danger)}
.lock-msg.success{color:var(--success)}

/* Shake animation */
@keyframes shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-4px)}30%,60%,90%{transform:translateX(4px)}}
.shake{animation:shake .4s ease}

/* ===== MAIN APP ===== */
#app{display:none;min-height:100vh}
#app.show{display:block;animation:appReveal .7s cubic-bezier(.4,0,.2,1)}
@keyframes appReveal{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.container{max-width:1200px;margin:0 auto;padding:20px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:16px;padding-bottom:20px;border-bottom:1px solid var(--border);animation:fadeInDown .5s ease;position:relative}
.header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4}
.header-left{display:flex;align-items:center;gap:14px}
.header-left svg{width:28px;height:28px;color:var(--accent)}
.header h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
.header-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2)}
.cloud-dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 8px rgba(0,224,200,.5);animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
.user-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}

/* Buttons */
.btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .25s cubic-bezier(.4,0,.2,1);display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);box-shadow:0 4px 25px rgba(232,120,32,.3)}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4);border-color:var(--border2)}
.btn-danger{background:rgba(255,88,88,.1);color:var(--danger);border:1px solid rgba(255,88,88,.2)}
.btn-danger:hover{background:rgba(255,88,88,.2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn svg{width:14px;height:14px}

/* Search */
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:220px;position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text4)}
.search-input{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text);font-size:14px;outline:none;transition:all .2s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,120,32,.1)}
.filter-select{padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text);font-size:13px;outline:none;min-width:140px;cursor:pointer;transition:all .25s}
.filter-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,120,32,.08)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:all .3s cubic-bezier(.4,0,.2,1);animation:cardIn .4s ease backwards}
.stat-card:nth-child(1){animation-delay:.05s}.stat-card:nth-child(2){animation-delay:.1s}.stat-card:nth-child(3){animation-delay:.15s}.stat-card:nth-child(4){animation-delay:.2s}.stat-card:nth-child(5){animation-delay:.25s}.stat-card:nth-child(6){animation-delay:.3s}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 25px rgba(232,120,32,.08)}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:24px;font-weight:700;margin-top:6px}
.stat-count{color:var(--accent2)}

/* Cards Grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;animation:cardIn .5s ease backwards}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.1s}.card:nth-child(3){animation-delay:.15s}.card:nth-child(4){animation-delay:.2s}.card:nth-child(5){animation-delay:.25s}.card:nth-child(6){animation-delay:.3s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .3s}
.card:hover{border-color:var(--accent);box-shadow:0 8px 40px rgba(232,120,32,.12),0 0 0 1px rgba(232,120,32,.06);transform:translateY(-3px)}
.card:hover::before{opacity:1}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-cat{font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:6px;font-weight:600}
.cat-password{background:rgba(255,88,88,.1);color:var(--danger)}
.cat-command{background:rgba(124,108,240,.1);color:var(--accent2)}
.cat-email{background:rgba(0,224,200,.1);color:var(--success)}
.cat-asset{background:rgba(255,184,48,.1);color:var(--warn)}
.cat-note{background:rgba(152,152,184,.1);color:var(--text2)}
.card-title{font-size:16px;font-weight:600;margin-bottom:8px}
.card-username{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:13px}
.card-username-label{color:var(--text3);font-weight:500}
.card-username-val{color:var(--accent2);font-weight:500}
.card-username button{background:none;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .2s}
.card-username button:hover{border-color:var(--accent);color:var(--accent2)}
.card-value{font-size:13px;color:var(--text2);word-break:break-all;font-family:'SF Mono',Monaco,Consolas,monospace;background:var(--bg);padding:10px 12px;border-radius:8px;max-height:90px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;border:1px solid var(--border)}
.card-meta{font-size:11px;color:var(--text3);margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.card-tag{padding:2px 8px;background:var(--bg4);border-radius:4px;font-size:10px;color:var(--text3)}
.card-actions{display:flex;gap:2px}
.card-actions button{background:none;border:none;cursor:pointer;font-size:11px;padding:5px 10px;border-radius:6px;color:var(--text3);transition:all .15s;display:flex;align-items:center;gap:4px}
.card-actions button:hover{background:var(--bg4);color:var(--text)}
.card-actions .del:hover{color:var(--danger);background:rgba(255,88,88,.1)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:32px;width:92%;max-width:460px;max-height:90vh;overflow-y:auto;animation:modalIn .4s cubic-bezier(.4,0,.2,1);box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(232,120,32,.05)}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h2{font-size:18px;font-weight:700;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:all .2s}
.form-group textarea{min-height:110px;resize:vertical;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px;line-height:1.5}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,120,32,.1)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}

/* Empty state */
.empty{text-align:center;padding:80px 20px;color:var(--text3);animation:fadeInDown .5s ease}
.empty-icon{width:64px;height:64px;margin:0 auto 20px;border-radius:16px;background:var(--bg3);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);transition:all .3s}
.empty-icon:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(232,120,32,.1)}
.empty-icon svg{width:28px;height:28px;color:var(--text4)}
.empty p{font-size:14px;margin-bottom:16px}
.empty .btn{margin-top:8px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--bg4),var(--bg3));color:var(--accent2);padding:12px 28px;border-radius:12px;font-size:13px;font-weight:500;z-index:999;animation:toastIn .4s cubic-bezier(.4,0,.2,1);border:1px solid var(--border2);box-shadow:0 8px 35px rgba(0,0,0,.5),0 0 20px rgba(232,120,32,.1)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* Print */
@media print{body{background:#fff;color:#000}.no-print{display:none!important}.card{border:1px solid #ddd;background:#fff}}
@media(max-width:600px){.cards-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock">
  <div class="lock-bg"></div>
  <div class="lock-grid"></div>
  <div class="lock-particles" id="lock-particles"></div>
  <div class="lock-orb" style="width:200px;height:200px;background:rgba(232,120,32,.05);top:20%;left:15%"></div>
  <div class="lock-orb" style="width:150px;height:150px;background:rgba(255,170,40,.04);bottom:25%;right:20%;animation-delay:-4s"></div>

  <div class="lock-content">
    <div class="lock-icon-wrap">
      <svg viewBox="0 0 80 80" fill="none">
        <rect x="18" y="36" width="44" height="34" rx="5" stroke="url(#lockGrad)" stroke-width="1.5" fill="none">
          <animate attributeName="opacity" from="0" to="1" dur=".6s" fill="freeze"/>
        </rect>
        <path d="M28 36V26C28 18.3 32.5 12 40 12C47.5 12 52 18.3 52 26V36" stroke="url(#lockGrad)" stroke-width="1.5" fill="none" stroke-linecap="round">
          <animate attributeName="opacity" from="0" to="1" dur=".6s" begin=".15s" fill="freeze"/>
          <animate attributeName="stroke-dasharray" from="0 100" to="100 0" dur=".8s" begin=".15s" fill="freeze"/>
        </path>
        <circle cx="40" cy="48" r="4" fill="url(#lockGrad)" opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur=".4s" begin=".5s" fill="freeze"/>
          <animate attributeName="r" from="0" to="4" dur=".4s" begin=".5s" fill="freeze"/>
        </circle>
        <line x1="40" y1="52" x2="40" y2="58" stroke="url(#lockGrad)" stroke-width="2" stroke-linecap="round" opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur=".3s" begin=".6s" fill="freeze"/>
        </line>
        <defs>
          <linearGradient id="lockGrad" x1="18" y1="12" x2="62" y2="70">
            <stop offset="0%" stop-color="#e87820"/>
            <stop offset="100%" stop-color="#ffaa40"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="lock-title">Welcome Back</div>
    <div class="lock-subtitle">SecureVault</div>

    <form id="lock-form" onsubmit="return handleUnlock(event)">
      <div class="lock-field">
        <label>Username</label>
        <input type="text" id="lock-user" placeholder="Enter username" autocomplete="off" required>
      </div>
      <div class="lock-field">
        <label>Password</label>
        <input type="password" id="lock-pass" placeholder="Enter password" autocomplete="off" required>
      </div>
      <button type="submit" class="lock-submit" id="lock-submit-btn">UNLOCK VAULT</button>
    </form>
    <div class="lock-msg" id="lock-msg"></div>
  </div>
</div>

<!-- Cloud Setup -->
<div id="cloud-setup" class="cloud-setup hidden">
  <div class="lock-bg"></div>
  <div class="lock-grid"></div>
  <div class="lock-particles" id="cloud-particles"></div>
  <div class="lock-orb" style="width:200px;height:200px;background:rgba(232,120,32,.05);top:20%;left:15%"></div>
  <div class="lock-orb" style="width:150px;height:150px;background:rgba(255,170,40,.04);bottom:25%;right:20%;animation-delay:-4s"></div>
  <div class="lock-content">
    <div class="lock-icon-wrap">
      <svg viewBox="0 0 80 80" fill="none">
        <path d="M40 10L12 28v24l28 18 28-18V28L40 10z" stroke="url(#cloudGrad)" stroke-width="1.5" fill="none">
          <animate attributeName="stroke-dasharray" from="0 200" to="200 0" dur="1s" fill="freeze"/>
        </path>
        <path d="M28 44l8 8 16-16" stroke="url(#cloudGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur=".4s" begin=".8s" fill="freeze"/>
        </path>
        <defs>
          <linearGradient id="cloudGrad" x1="12" y1="10" x2="68" y2="70">
            <stop offset="0%" stop-color="#e87820"/>
            <stop offset="100%" stop-color="#ffaa40"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="lock-title">Cloud Sync</div>
    <div class="lock-subtitle">Connect to GitHub</div>
    <form id="cloud-form" onsubmit="return handleCloudSetup(event)">
      <div class="lock-field">
        <label>GitHub Token</label>
        <input type="password" id="cloud-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" required>
      </div>
      <div style="text-align:left;margin-bottom:16px">
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=SecureVault" target="_blank" style="color:var(--accent2);font-size:12px;text-decoration:none">Generate token here</a>
      </div>
      <button type="submit" class="lock-submit" id="cloud-submit-btn">CONNECT</button>
    </form>
    <div class="lock-msg" id="cloud-msg"></div>
  </div>
</div>

<!-- Main App -->
<div id="app">
<div class="container no-print">

<script>
/* ==================== CRYPTO ==================== */
const enc = new TextEncoder();
const dec = new TextDecoder();

async function deriveKey(pw, salt) {
  const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:310000,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']);
}

async function encryptData(data, pw) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(pw, salt);
  const enc2 = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, enc.encode(JSON.stringify(data)));
  const r = new Uint8Array(salt.length + iv.length + enc2.byteLength);
  r.set(salt, 0); r.set(iv, salt.length); r.set(new Uint8Array(enc2), salt.length + iv.length);
  return btoa(String.fromCharCode(...r));
}

async function decryptData(b64, pw) {
  try {
    const d = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const key = await deriveKey(pw, d.slice(0,16));
    const dec2 = await crypto.subtle.decrypt({name:'AES-GCM',iv:d.slice(16,28)}, key, d.slice(28));
    return JSON.parse(dec.decode(dec2));
  } catch { return null; }
}

/* ==================== STORAGE ==================== */
let masterKey = null;
let currentUser = null;
let items = [];
let ghToken = null;
let ghSha = null;

const K_DATA = 'sv_data';
const K_TOKEN = 'sv_token';
const GH_REPO = 'rajguptacode/securevault-data';
const GH_FILE = 'vault.enc';

async function ghApi(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + ghToken, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('https://api.github.com/repos/' + GH_REPO + '/contents/' + path, opts);
  if (method === 'GET' && r.status === 404) return null;
  if (!r.ok) throw new Error('GitHub API error: ' + r.status);
  return r.json();
}

async function save() {
  const encrypted = await encryptData({items, user: currentUser}, masterKey);
  try {
    const body = { message: 'vault update', content: btoa(unescape(encodeURIComponent(encrypted))), ...(ghSha ? {sha: ghSha} : {}) };
    const res = await ghApi('PUT', GH_FILE, body);
    ghSha = res.content.sha;
    toast('Synced to cloud');
  } catch(e) {
    localStorage.setItem(K_DATA, encrypted);
    toast('Cloud sync failed, saved locally');
  }
}

async function load(pw) {
  try {
    const res = await ghApi('GET', GH_FILE);
    if (!res) { items = []; return {ok:true, fresh:true}; }
    ghSha = res.content.sha;
    const encrypted = decodeURIComponent(escape(atob(res.content)));
    const d = await decryptData(encrypted, pw);
    if (!d) return {ok:false};
    items = d.items || [];
    currentUser = d.user || 'User';
    return {ok:true};
  } catch(e) {
    const local = localStorage.getItem(K_DATA);
    if (!local) { items = []; return {ok:true, fresh:true}; }
    const d = await decryptData(local, pw);
    if (!d) return {ok:false};
    items = d.items || [];
    currentUser = d.user || 'User';
    return {ok:true};
  }
}

function hasData() { return ghToken !== null; }
function hasToken() { return !!localStorage.getItem(K_TOKEN); }
function saveToken(t) { localStorage.setItem(K_TOKEN, t); }
function getToken() { return localStorage.getItem(K_TOKEN); }
function clearToken() { localStorage.removeItem(K_TOKEN); }

/* ==================== UI ==================== */
const catLabels = {password:'Password',command:'Command',email:'Email',asset:'Asset',note:'Note'};
const catColors = {password:'cat-password',command:'cat-command',email:'cat-email',asset:'cat-asset',note:'cat-note'};

let searchQ = '';
let filterCat = '';

function getFiltered() {
  let l = [...items];
  if (searchQ) {
    const q = searchQ.toLowerCase();
    l = l.filter(i => i.title.toLowerCase().includes(q) || i.value.toLowerCase().includes(q) || (i.tags||[]).some(t => t.toLowerCase().includes(q)));
  }
  if (filterCat) l = l.filter(i => i.category === filterCat);
  return l.sort((a,b) => b.updatedAt - a.updatedAt);
}

function render() {
  const list = getFiltered();
  const total = items.length;
  const c = {};
  items.forEach(i => { c[i.category] = (c[i.category]||0)+1; });

  document.getElementById('user-avatar').textContent = (currentUser||'U')[0].toUpperCase();
  document.getElementById('user-display').textContent = currentUser || 'User';

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value stat-count">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Passwords</div><div class="stat-value" style="color:var(--danger)">${c.password||0}</div></div>
    <div class="stat-card"><div class="stat-label">Commands</div><div class="stat-value" style="color:var(--accent2)">${c.command||0}</div></div>
    <div class="stat-card"><div class="stat-label">Emails</div><div class="stat-value" style="color:var(--success)">${c.email||0}</div></div>
    <div class="stat-card"><div class="stat-label">Assets</div><div class="stat-value" style="color:var(--warn)">${c.asset||0}</div></div>
    <div class="stat-card"><div class="stat-label">Notes</div><div class="stat-value" style="color:var(--text2)">${c.note||0}</div></div>`;

  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');
  if (!list.length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  grid.innerHTML = list.map(i => {
    const tags = (i.tags||[]).map(t=>`<span class="card-tag">#${esc(t)}</span>`).join('');
    const val = esc(i.value).replace(/\\n/g,'\n');
    const usernameRow = i.username ? `<div class="card-username"><span class="card-username-label">Username:</span> <span class="card-username-val">${esc(i.username)}</span> <button onclick="copyVal(this)" data-val="${esc(i.username)}" title="Copy username">Copy</button></div>` : '';
    return `<div class="card">
      <div class="card-header">
        <span class="card-cat ${catColors[i.category]}">${catLabels[i.category]}</span>
        <div class="card-actions">
          <button onclick="copyVal(this)" data-val="${esc(i.value)}" title="Copy value">Copy</button>
          <button onclick="editItem('${i.id}')" title="Edit">Edit</button>
          <button class="del" onclick="removeItem('${i.id}')" title="Delete">Del</button>
        </div>
      </div>
      <div class="card-title">${esc(i.title)}</div>
      ${usernameRow}
      <div class="card-value">${val}</div>
      <div class="card-meta">
        <div class="card-tags">${tags}</div>
        <span>${fmtDate(i.updatedAt)}</span>
      </div>
    </div>`;
  }).join('');
}

function fmtDate(ts) { return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function copyVal(btn) {
  const v = btn.dataset.val;
  if (navigator.clipboard&&navigator.clipboard.writeText) {
    navigator.clipboard.writeText(v).then(()=>toast('Copied!')).catch(()=>fbCopy(v));
  } else fbCopy(v);
}
function fbCopy(t) {
  const a=document.createElement('textarea'); a.value=t; a.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(a); a.select();
  try{document.execCommand('copy');toast('Copied!');}catch{prompt('Copy:',t);}
  document.body.removeChild(a);
}
function toast(m) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=m;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},1500);
}

function handleSearch() {
  searchQ = document.getElementById('search-input').value.trim();
  filterCat = document.getElementById('filter-cat').value;
  render();
}

function openModal(editId) {
  document.getElementById('modal-title').textContent = editId?'Edit Item':'Add Item';
  document.getElementById('modal-submit-btn').textContent = editId?'Save':'Add';
  document.getElementById('f-edit-id').value = editId||'';
  if (editId) {
    const i = items.find(x=>x.id===editId);
    if(i){document.getElementById('f-category').value=i.category;document.getElementById('f-title').value=i.title;document.getElementById('f-username').value=i.username||'';document.getElementById('f-value').value=i.value;document.getElementById('f-tags').value=(i.tags||[]).join(', ');}
  } else document.getElementById('item-form').reset();
  updatePlaceholder();
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-title').focus();
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); document.getElementById('f-edit-id').value=''; }

function handleSubmit(e) {
  e.preventDefault();
  const eid=document.getElementById('f-edit-id').value;
  const cat=document.getElementById('f-category').value;
  const title=document.getElementById('f-title').value.trim();
  const username=document.getElementById('f-username').value.trim();
  const value=document.getElementById('f-value').value.trim();
  const tags=document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!title||!value)return;
  if(eid){const i=items.findIndex(x=>x.id===eid);if(i>=0)items[i]={...items[i],category:cat,title,username,value,tags,updatedAt:Date.now()};}
  else items.push({id:uid(),category,title,username,value,tags,createdAt:Date.now(),updatedAt:Date.now()});
  save(); closeModal(); render();
}
function editItem(id){openModal(id);}
function removeItem(id){if(!confirm('Delete this item?'))return;items=items.filter(i=>i.id!==id);save();render();}
function syncNow(){if(!ghToken)return;save();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function updatePlaceholder(){
  const c=document.getElementById('f-category').value;
  const v=document.getElementById('f-value');
  document.getElementById('fg-username').style.display = c==='password' ? 'block' : 'none';
  v.placeholder={password:'Enter password...',command:'Enter command...',email:'Enter email...',asset:'Enter asset details...',note:'Enter notes...'}[c]||'Enter value...';
}

/* ==================== EXPORT / IMPORT ==================== */
function exportData() {
  encryptData({items,user:currentUser}, masterKey).then(e=>{
    const b=new Blob([e],{type:'text/plain'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a'); a.href=u; a.download='securevault-'+new Date().toISOString().split('T')[0]+'.enc'; a.click();
    URL.revokeObjectURL(u); toast('Backup exported!');
  });
}
function handleImport(e) {
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=async function(ev){
    try{
      const d=await decryptData(ev.target.result,masterKey);
      if(d&&d.items){items=d.items;currentUser=d.user||currentUser;save();render();toast('Imported '+d.items.length+' items!');}
      else alert('Wrong password or corrupted file');
    }catch{alert('Import failed');}
  };
  r.readAsText(f); e.target.value='';
}

/* ==================== LOCK ==================== */
function lockVault() {
  secureClear();
  document.getElementById('app').classList.remove('show');
  document.getElementById('cloud-setup').classList.add('hidden');
  document.getElementById('lock').classList.remove('hidden');
  document.getElementById('lock-user').value='';
  document.getElementById('lock-pass').value='';
  document.getElementById('lock-user').focus();
}
function disconnectCloud() {
  if(!confirm('Change GitHub account? You will need to enter token again.'))return;
  clearToken();
  lockVault();
}

async function handleUnlock(e) {
  e.preventDefault();
  const user=document.getElementById('lock-user').value.trim();
  const pw=document.getElementById('lock-pass').value;
  const msg=document.getElementById('lock-msg');
  const form=document.getElementById('lock-form');

  if(!user||!pw)return;

  if(isLockedOut()){
    msg.className='lock-msg error'; msg.textContent='Too many attempts. Wait '+getLockTimeLeft()+'s';
    return false;
  }

  const combo=user+':'+pw;

  if(!hasToken()){
    masterKey=combo;
    currentUser=user;
    document.getElementById('lock').classList.add('hidden');
    document.getElementById('cloud-setup').classList.remove('hidden');
    initParticles('cloud-particles');
    document.getElementById('cloud-token').focus();
    return false;
  }

  ghToken=getToken();
  const r=await load(combo);
  if(r.ok){
    masterKey=combo;
    if(r.fresh){
      const body={message:'init vault',content:btoa(unescape(encodeURIComponent(await encryptData({items:[],user},combo))))};
      try{const res=await ghApi('PUT',GH_FILE,body);ghSha=res.content.sha;}catch{}
    }
    msg.className='lock-msg success'; msg.textContent='Welcome back, '+currentUser+'!';
    recordSuccess();
    setTimeout(()=>{
      document.getElementById('lock').classList.add('hidden');
      document.getElementById('app').classList.add('show');
      render();
    },500);
  } else {
    msg.className='lock-msg error'; msg.textContent='Invalid username or password';
    recordFail();
    form.classList.add('shake');
    setTimeout(()=>{form.classList.remove('shake');msg.textContent='';},1500);
    document.getElementById('lock-pass').value='';
    document.getElementById('lock-pass').focus();
  }
  return false;
}

async function handleCloudSetup(e) {
  e.preventDefault();
  const token=document.getElementById('cloud-token').value.trim();
  const msg=document.getElementById('cloud-msg');
  const form=document.getElementById('cloud-form');
  if(!token)return;
  if(!validateToken(token)){
    msg.className='lock-msg error'; msg.textContent='Invalid token format (must start with ghp_)';
    return false;
  }

  ghToken=token;
  try{
    const r=await fetch('https://api.github.com/user',{headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'}});
    if(!r.ok) throw new Error();
    const user=await r.json();
    saveToken(token);

    const loadResult=await load(masterKey);
    if(loadResult.ok && !loadResult.fresh){
      currentUser=loadResult.user||currentUser;
    } else if(loadResult.ok && loadResult.fresh){
      currentUser=user;
      items=[];
      await save();
    } else {
      ghToken=null;
      msg.className='lock-msg error'; msg.textContent='Wrong username or password for this vault';
      return false;
    }

    msg.className='lock-msg success'; msg.textContent='Connected as '+user.login+'!';
    recordSuccess();
    setTimeout(()=>{
      document.getElementById('cloud-setup').classList.add('hidden');
      document.getElementById('app').classList.add('show');
      render();
    },600);
  }catch{
    msg.className='lock-msg error'; msg.textContent='Invalid token';
    form.classList.add('shake');
    setTimeout(()=>{form.classList.remove('shake');msg.textContent='';},1500);
    document.getElementById('cloud-token').value='';
    document.getElementById('cloud-token').focus();
  }
  return false;
}

/* ==================== INIT ==================== */
function initParticles(id){
  const pc=document.getElementById(id);
  if(!pc||pc.children.length>0)return;
  for(let i=0;i<30;i++){
    const p=document.createElement('div'); p.className='lp';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(5+Math.random()*8)+'s';
    p.style.animationDelay=Math.random()*6+'s';
    const s=1+Math.random()*3;
    p.style.width=p.style.height=s+'px';
    p.style.background=['rgba(232,120,32,.5)','rgba(255,170,64,.4)','rgba(192,96,16,.3)'][Math.floor(Math.random()*3)];
    pc.appendChild(p);
  }
}
(function(){
  initParticles('lock-particles');
  document.getElementById('lock-user').focus();

  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&document.getElementById('modal-overlay').classList.contains('open'))closeModal();
    if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();openModal();}
  });
})();

/* ==================== SECURITY MODULE ==================== */

/* --- 1. Anti-Iframe (Clickjacking Prevention) --- */
(function(){
  if (window.self !== window.top) { document.body.innerHTML = ''; window.top.location = window.self.location; }
  try { if (window.top !== window) window.top.location = window.self.location; } catch(e) {}
  const style = document.createElement('style');
  style.textContent = 'body{overflow:hidden!important}';
  document.head.appendChild(style);
  setTimeout(() => style.remove(), 100);
})();

/* --- 2. Brute Force Protection --- */
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 300000;
let failCount = parseInt(localStorage.getItem('sv_fails')||'0');
let lockUntil = parseInt(localStorage.getItem('sv_lockout')||'0');

function isLockedOut() {
  if (Date.now() < lockUntil) return true;
  if (Date.now() >= lockUntil && failCount >= MAX_ATTEMPTS) { failCount = 0; localStorage.setItem('sv_fails','0'); }
  return false;
}
function recordFail() {
  failCount++;
  localStorage.setItem('sv_fails', failCount);
  if (failCount >= MAX_ATTEMPTS) { lockUntil = Date.now() + LOCKOUT_MS; localStorage.setItem('sv_lockout', lockUntil); }
}
function recordSuccess() { failCount = 0; localStorage.setItem('sv_fails','0'); localStorage.setItem('sv_lockout','0'); }
function getLockTimeLeft() { return Math.max(0, Math.ceil((lockUntil - Date.now()) / 1000)); }

/* --- 3. Auto-Lock on Idle --- */
const IDLE_MS = 300000;
let lastActivity = Date.now();
let idleTimer = null;

function resetIdle() { lastActivity = Date.now(); }
function startIdleCheck() {
  setInterval(() => {
    if (masterKey && Date.now() - lastActivity > IDLE_MS) { lockVault(); toast('Auto-locked (idle)'); }
  }, 10000);
  ['mousemove','keydown','click','scroll','touchstart'].forEach(e => document.addEventListener(e, resetIdle, {passive:true}));
}

/* --- 4. Clipboard Auto-Clear --- */
let clipTimer = null;
function secureCopy(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(()=>{toast('Copied!');scheduleClipClear();}).catch(()=>fbSecureCopy(text));
  } else fbSecureCopy(text);
}
function fbSecureCopy(t) {
  const a=document.createElement('textarea'); a.value=t; a.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(a); a.select();
  try{document.execCommand('copy');toast('Copied!');scheduleClipClear();}catch{prompt('Copy:',t);}
  document.body.removeChild(a);
}
function scheduleClipClear() {
  clearTimeout(clipTimer);
  clipTimer = setTimeout(() => {
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText('');
    const a=document.createElement('textarea'); a.value=''; a.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(a); a.select(); try{document.execCommand('copy');}catch{}; document.body.removeChild(a);
  }, 30000);
}

/* --- 5. Input Sanitization --- */
function sanitizeInput(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;').replace(/\//g,'&#x2F;');
}
function sanitizeHTML(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function validateToken(t) { return /^(ghp_[a-zA-Z0-9]{36,}|github_pat_[a-zA-Z0-9_]{50,})$/.test(t); }

/* --- 6. Anti-Tampering --- */
const CODE_HASH_KEY = 'sv_hash';
async function computeCodeHash() {
  const scripts = document.querySelectorAll('script');
  if (!scripts.length) return '';
  const text = scripts[scripts.length-1].textContent;
  const data = enc.encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function verifyIntegrity() {
  const current = await computeCodeHash();
  const stored = localStorage.getItem(CODE_HASH_KEY);
  if (stored && stored !== current) {
    toast('Warning: Code was updated. If you did not update, this may be a security risk.');
    console.warn('[SECURITY] Code integrity mismatch - possible tampering or update');
  }
  localStorage.setItem(CODE_HASH_KEY, current);
}

/* --- 7. Memory Cleanup --- */
function secureClear() {
  masterKey = null; currentUser = null; items = []; ghSha = null; ghToken = null;
  if (clipTimer) { clearTimeout(clipTimer); clipTimer = null; }
  if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
  if (window.gc) { try { window.gc(); } catch(e) {} }
}

/* --- 8. Secure String Comparison --- */
function secureCompare(a, b) {
  if (a.length !== b.length) return false;
  let r = 0;
  for (let i = 0; i < a.length; i++) r |= a.charCodeAt(i) ^ b.charCodeAt(i);
  return r === 0;
}

/* --- 9. DevTools Detection --- */
(function(){
  const el = new Image();
  Object.defineProperty(el, 'id', { get: function() { detectDevTools(); }});
  setInterval(() => { console.log('%c', el); console.clear(); }, 1000);
  let devToolsOpen = false;
  const threshold = 160;
  function detectDevTools() {
    if (devToolsOpen) return;
    const w = window.outerWidth - window.innerWidth > threshold;
    const h = window.outerHeight - window.innerHeight > threshold;
    if (w || h) {
      devToolsOpen = true;
      if (masterKey) { lockVault(); toast('Security: Vault locked (DevTools detected)'); }
    }
  }
  window.addEventListener('resize', detectDevTools);
})();

/* --- 10. Anti-Console --- */
(function(){
  console.log = function(){}; console.warn = function(){};
  console.error = function(){}; console.info = function(){};
  setInterval(() => { console.clear(); }, 2000);
})();

/* --- 11. Keyboard Shortcut Protection --- */
document.addEventListener('keydown', function(e) {
  if (e.key === 'F12') { e.preventDefault(); return false; }
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && 'IiJjCc'.includes(e.key)) { e.preventDefault(); return false; }
  if ((e.ctrlKey||e.metaKey) && 'us'.includes(e.key)) { e.preventDefault(); return false; }
  if (e.key === 'F5' && e.shiftKey) { e.preventDefault(); return false; }
  if ((e.ctrlKey||e.metaKey) && e.key === 'r') { e.preventDefault(); return false; }
});

/* --- 12. Right-Click + Selection Protection --- */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => { if (!['INPUT','TEXTAREA'].includes(e.target.tagName)) e.preventDefault(); });

/* --- 13. Window Blur - Screen Blur --- */
let blurOverlay = null;
function createBlurOverlay() {
  if (blurOverlay) return;
  blurOverlay = document.createElement('div');
  blurOverlay.id = 'security-blur';
  blurOverlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(4,4,10,.95);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;transition:opacity .3s';
  blurOverlay.innerHTML = '<div style="text-align:center;color:var(--text3)"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><p style="font-size:13px;letter-spacing:1px">VAULT HIDDEN</p></div>';
  document.body.appendChild(blurOverlay);
}
function removeBlurOverlay() {
  if (blurOverlay) { blurOverlay.remove(); blurOverlay = null; }
}
document.addEventListener('visibilitychange', () => {
  if (!masterKey) return;
  if (document.hidden) createBlurOverlay(); else removeBlurOverlay();
});

/* --- 14. Anti-Shoulder-Surfing: Auto-lock on tab switch --- */
let tabSwitchCount = 0;
document.addEventListener('visibilitychange', () => {
  if (!masterKey) return;
  if (document.hidden) {
    tabSwitchCount++;
    if (tabSwitchCount >= 3) {
      lockVault();
      toast('Auto-locked (frequent tab switches)');
      tabSwitchCount = 0;
    }
  }
});
setInterval(() => { tabSwitchCount = Math.max(0, tabSwitchCount - 1); }, 30000);

/* --- 15. Anti-Browser-Extension: DOM Mutation Observer --- */
(function(){
  if (typeof MutationObserver === 'undefined') return;
  const sensitive = ['lock-form','cloud-form','item-form'];
  const observer = new MutationObserver(mutations => {
    for (const m of mutations) {
      for (const node of m.addedNodes) {
        if (node.nodeType !== 1) continue;
        const scripts = node.querySelectorAll ? node.querySelectorAll('script') : [];
        if (scripts.length > 0) { scripts.forEach(s => s.remove()); console.clear(); }
        if (node.tagName === 'SCRIPT') { node.remove(); console.clear(); }
      }
    }
  });
  observer.observe(document.documentElement, { childList: true, subtree: true });
})();

/* --- 16. Secure Token Storage (Encrypted in localStorage) --- */
const TK_ENC_KEY = 'sv_tk';
async function deriveStorageKey(pw) {
  const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode('sv-token-salt-!'),iterations:100000,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']);
}
async function encryptToken(token, pw) {
  const key = await deriveStorageKey(pw);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, enc.encode(token));
  const r = new Uint8Array(iv.length + ct.byteLength);
  r.set(iv); r.set(new Uint8Array(ct), iv.length);
  return btoa(String.fromCharCode(...r));
}
async function decryptToken(b64, pw) {
  try {
    const d = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const key = await deriveStorageKey(pw);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv:d.slice(0,12)}, key, d.slice(12));
    return dec.decode(pt);
  } catch { return null; }
}

/* --- 17. Network Security: Verify HTTPS --- */
(function(){
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    location.href = 'https:' + location.href.substring(location.protocol.length);
  }
})();

/* --- 18. Session Integrity --- */
let sessionToken = crypto.getRandomValues(new Uint8Array(16)).join('');
function verifySession() { return sessionToken !== ''; }

/* --- 19. Master Password Re-Enter for Sensitive Ops --- */
async function requirePassword(action) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center';
    overlay.innerHTML = `<div style="background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:28px;width:90%;max-width:340px;text-align:center">
      <p style="font-size:14px;color:var(--text2);margin-bottom:16px">Re-enter password for: <strong style="color:var(--accent)">${action}</strong></p>
      <input type="password" id="reauth-pass" placeholder="Password" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text);font-size:14px;margin-bottom:12px;text-align:center" autocomplete="off">
      <div style="display:flex;gap:8px;justify-content:center">
        <button onclick="this.closest('div[style]').parentElement.remove()" style="padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px">Cancel</button>
        <button id="reauth-ok" style="padding:8px 16px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px">Confirm</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#reauth-pass').focus();
    overlay.querySelector('#reauth-ok').onclick = () => {
      const val = overlay.querySelector('#reauth-pass').value;
      overlay.remove();
      if (masterKey && secureCompare(masterKey.split(':')[1] || '', val)) resolve(true);
      else { toast('Wrong password'); resolve(false); }
    };
    overlay.querySelector('#reauth-pass').addEventListener('keydown', e => { if (e.key === 'Enter') overlay.querySelector('#reauth-ok').click(); });
  });
}

/* --- Override copyVal for security --- */
window.copyVal = function(btn) { secureCopy(btn.dataset.val); };
window.fbCopy = function(t) { secureCopy(t); };

/* --- 20. Anti-Replay: Timestamp Validation --- */
let lastSaveTime = 0;
const SAVE_COOLDOWN = 1000;
function canSave() {
  const now = Date.now();
  if (now - lastSaveTime < SAVE_COOLDOWN) return false;
  lastSaveTime = now;
  return true;
}

/* --- Initialize Security --- */
(async function(){
  try { await verifyIntegrity(); } catch(e) { return; }
  startIdleCheck();
  resetIdle();

  if (isLockedOut()) {
    const lockMsg = document.getElementById('lock-msg');
    const submitBtn = document.getElementById('lock-submit-btn');
    if (lockMsg && submitBtn) {
      submitBtn.disabled = true;
      submitBtn.style.opacity = '.5';
      const tick = () => {
        const left = getLockTimeLeft();
        if (left <= 0) { submitBtn.disabled = false; submitBtn.style.opacity = '1'; lockMsg.textContent = ''; lockMsg.className = 'lock-msg'; return; }
        lockMsg.className = 'lock-msg error';
        lockMsg.textContent = 'Locked for ' + left + 's (too many attempts)';
        requestAnimationFrame(tick);
      };
      tick();
    }
  }
})();
