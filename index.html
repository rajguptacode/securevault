<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVault</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--bg4:#222233;
--border:#2a2a3a;--text:#e8e8f0;--text2:#9898b0;--text3:#606078;
--accent:#6c5ce7;--accent2:#a29bfe;--success:#00cec9;--danger:#ff6b6b;--warn:#feca57;
--glow:rgba(108,92,231,.15);--glow2:rgba(0,206,201,.1);
}
html{font-size:14px}
body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Lock Screen */
#lock{position:fixed;inset:0;z-index:9999;background:#050510;display:flex;align-items:center;justify-content:center;overflow:hidden}
#lock.hidden{opacity:0;visibility:hidden;pointer-events:none;transition:all .6s ease}
.lock-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(108,92,231,.08),transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(0,206,201,.06),transparent 50%);animation:lockBg 5s ease infinite alternate}
@keyframes lockBg{from{opacity:.5}to{opacity:1}}
.lock-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(108,92,231,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(108,92,231,.02) 1px,transparent 1px);background-size:50px 50px;animation:gridScroll 25s linear infinite}
@keyframes gridScroll{to{transform:translate(50px,50px)}}
.lock-particles{position:absolute;inset:0;overflow:hidden}
.lp{position:absolute;width:2px;height:2px;background:rgba(108,92,231,.5);border-radius:50%;animation:lpFloat linear infinite}
@keyframes lpFloat{0%{opacity:0;transform:translateY(100vh) scale(0)}15%{opacity:1}85%{opacity:1}100%{opacity:0;transform:translateY(-10vh) scale(1.5)}}
.lock-content{position:relative;z-index:2;text-align:center}
.lock-icon{width:64px;height:64px;margin:0 auto 24px;position:relative}
.lock-icon svg{width:100%;height:100%}
.lock-ring{position:absolute;inset:-10px;border:1px solid rgba(108,92,231,.2);border-radius:50%;animation:ringPulse 2.5s ease-in-out infinite}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.2);opacity:.6}}
.lock-title{font-size:13px;text-transform:uppercase;letter-spacing:5px;color:var(--text3);margin-bottom:28px;opacity:0;animation:fadeUp .6s ease .2s forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.lock-input{width:220px;padding:16px;font-size:24px;font-weight:700;text-align:center;letter-spacing:8px;border:1px solid rgba(108,92,231,.25);border-radius:12px;background:rgba(255,255,255,.03);color:#fff;outline:none;transition:all .3s;backdrop-filter:blur(10px);opacity:0;animation:fadeUp .5s ease .4s forwards}
.lock-input:focus{border-color:rgba(108,92,231,.6);box-shadow:0 0 40px rgba(108,92,231,.15)}
.lock-input::placeholder{color:rgba(255,255,255,.12);letter-spacing:4px;font-size:14px}
.lock-input.error{border-color:var(--danger);box-shadow:0 0 20px rgba(255,107,107,.2);animation:shake .4s}
.lock-input.success{border-color:var(--success);box-shadow:0 0 30px rgba(0,206,201,.3)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.lock-hint{margin-top:14px;font-size:11px;color:var(--text3);opacity:0;animation:fadeUp .4s ease .6s forwards}
.lock-error-msg{margin-top:10px;font-size:12px;color:var(--danger);min-height:16px}

/* Main App */
#app{display:none;min-height:100vh}
#app.show{display:block;animation:appIn .6s ease}
@keyframes appIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.container{max-width:1100px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:10px}
.header h1 svg{width:24px;height:24px}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:12px}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-size:14px;outline:none}
.search-input:focus{border-color:var(--accent)}
.filter-select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-size:13px;outline:none;min-width:120px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.stat-value{font-size:20px;font-weight:700;margin-top:4px}
.stat-count{color:var(--accent2)}

/* Cards Grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s}
.card:hover{border-color:var(--accent);box-shadow:0 0 20px var(--glow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-cat{font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:4px;font-weight:600}
.cat-password{background:rgba(255,107,107,.12);color:var(--danger)}
.cat-command{background:rgba(108,92,231,.12);color:var(--accent2)}
.cat-email{background:rgba(0,206,201,.12);color:var(--success)}
.cat-asset{background:rgba(254,202,87,.12);color:var(--warn)}
.cat-note{background:rgba(152,152,176,.12);color:var(--text2)}
.card-title{font-size:15px;font-weight:600;margin-bottom:6px;word-break:break-word}
.card-value{font-size:13px;color:var(--text2);word-break:break-all;font-family:"SF Mono",Monaco,Consolas,monospace;background:var(--bg3);padding:8px 10px;border-radius:6px;max-height:80px;overflow-y:auto;white-space:pre-wrap;line-height:1.4}
.card-meta{font-size:11px;color:var(--text3);margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.card-actions{display:flex;gap:4px}
.card-actions button{background:none;border:none;cursor:pointer;font-size:11px;padding:4px 8px;border-radius:4px;color:var(--text3);transition:all .15s}
.card-actions button:hover{background:var(--bg4);color:var(--text)}
.card-actions .del:hover{color:var(--danger);background:rgba(255,107,107,.1)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px;width:90%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:600;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-size:14px;outline:none;font-family:inherit}
.form-group textarea{min-height:100px;resize:vertical;font-family:"SF Mono",Monaco,Consolas,monospace;font-size:13px;line-height:1.4}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.3}
.empty p{font-size:14px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg4);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;animation:fadeIn .3s;border:1px solid var(--border)}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Print */
@media print{body{background:#fff;color:#000}.no-print{display:none!important}.card{border:1px solid #ddd;background:#fff}}
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock">
  <div class="lock-bg"></div>
  <div class="lock-grid"></div>
  <div class="lock-particles" id="lock-particles"></div>
  <div class="lock-content">
    <div class="lock-icon">
      <div class="lock-ring"></div>
      <svg viewBox="0 0 64 64" fill="none">
        <rect x="14" y="30" width="36" height="28" rx="4" stroke="#6c5ce7" stroke-width="1.5" fill="none" opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur=".5s" fill="freeze"/>
        </rect>
        <path d="M22 30V22C22 15.4 26.5 10 32 10C37.5 10 42 15.4 42 22V30" stroke="#6c5ce7" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur=".5s" begin=".2s" fill="freeze"/>
        </path>
        <circle cx="32" cy="40" r="3" fill="#6c5ce7" opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur=".3s" begin=".5s" fill="freeze"/>
        </circle>
        <line x1="32" y1="43" x2="32" y2="48" stroke="#6c5ce7" stroke-width="1.5" stroke-linecap="round" opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur=".3s" begin=".5s" fill="freeze"/>
        </line>
      </svg>
    </div>
    <div class="lock-title">SecureVault</div>
    <input type="password" class="lock-input" id="lock-input" placeholder="_ _ _ _ _ _" autocomplete="off">
    <div class="lock-hint">Enter your master password</div>
    <div class="lock-error-msg" id="lock-error"></div>
  </div>
</div>

<!-- Main App -->
<div id="app">
<div class="container no-print">
  <div class="header">
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      SecureVault
    </h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="exportData()">Export</button>
      <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
      <button class="btn btn-primary" onclick="openModal()">+ Add</button>
      <button class="btn btn-danger btn-sm" onclick="lockVault()">Lock</button>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" class="search-input" id="search-input" placeholder="Search..." oninput="handleSearch()">
    <select class="filter-select" id="filter-cat" onchange="handleSearch()">
      <option value="">All Categories</option>
      <option value="password">Passwords</option>
      <option value="command">Commands</option>
      <option value="email">Emails</option>
      <option value="asset">Assets</option>
      <option value="note">Notes</option>
    </select>
  </div>

  <div class="stats" id="stats"></div>
  <div class="cards-grid" id="cards-grid"></div>
  <div class="empty" id="empty-state" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <p>No items yet. Click "+ Add" to get started.</p>
  </div>
</div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===event.currentTarget)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Add Item</h2>
    <form id="item-form" onsubmit="handleSubmit(event)">
      <input type="hidden" id="f-edit-id" value="">
      <div class="form-group">
        <label for="f-category">Category</label>
        <select id="f-category" required onchange="updatePlaceholder()">
          <option value="password">Password</option>
          <option value="command">Command</option>
          <option value="email">Email</option>
          <option value="asset">Asset</option>
          <option value="note">Note</option>
        </select>
      </div>
      <div class="form-group">
        <label for="f-title">Title</label>
        <input id="f-title" type="text" required placeholder="e.g. GitHub Password">
      </div>
      <div class="form-group">
        <label for="f-value">Value</label>
        <textarea id="f-value" required placeholder="Enter value..."></textarea>
      </div>
      <div class="form-group">
        <label for="f-tags">Tags (comma separated)</label>
        <input id="f-tags" type="text" placeholder="e.g. work, important">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="modal-submit-btn">Add</button>
      </div>
    </form>
  </div>
</div>

<script>
/* ==================== CRYPTO ==================== */
const encoder = new TextEncoder();
const decoder = new TextDecoder();

async function deriveKey(password, salt) {
  const keyMaterial = await crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encrypt(data, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoder.encode(JSON.stringify(data)));
  const result = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
  result.set(salt, 0);
  result.set(iv, salt.length);
  result.set(new Uint8Array(encrypted), salt.length + iv.length);
  return btoa(String.fromCharCode(...result));
}

async function decrypt(base64, password) {
  try {
    const data = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
    const salt = data.slice(0, 16);
    const iv = data.slice(16, 28);
    const encrypted = data.slice(28);
    const key = await deriveKey(password, salt);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, encrypted);
    return JSON.parse(decoder.decode(decrypted));
  } catch { return null; }
}

/* ==================== STORAGE ==================== */
let masterKey = null;
let items = [];

const DB_KEY = 'securevault_data';
const DB_CHECK = 'securevault_check';

function save() {
  encrypt(items, masterKey).then(enc => {
    localStorage.setItem(DB_KEY, enc);
    const check = { ts: Date.now(), hash: enc.slice(0, 20) };
    localStorage.setItem(DB_CHECK, JSON.stringify(check));
  });
}

async function load(password) {
  const enc = localStorage.getItem(DB_KEY);
  if (!enc) { items = []; return true; }
  const data = await decrypt(enc, password);
  if (!data) return false;
  items = data;
  return true;
}

function hasData() { return !!localStorage.getItem(DB_KEY); }

/* ==================== UI ==================== */
const catLabels = { password: 'Password', command: 'Command', email: 'Email', asset: 'Asset', note: 'Note' };
const catColors = { password: 'cat-password', command: 'cat-command', email: 'cat-email', asset: 'cat-asset', note: 'cat-note' };

let searchQuery = '';
let filterCat = '';

function getFiltered() {
  let list = [...items];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(i => i.title.toLowerCase().includes(q) || i.value.toLowerCase().includes(q) || (i.tags||[]).some(t => t.toLowerCase().includes(q)));
  }
  if (filterCat) list = list.filter(i => i.category === filterCat);
  return list.sort((a, b) => b.updatedAt - a.updatedAt);
}

function render() {
  const list = getFiltered();
  const total = items.length;
  const counts = {};
  items.forEach(i => { counts[i.category] = (counts[i.category]||0) + 1; });

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Items</div><div class="stat-value stat-count">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Passwords</div><div class="stat-value" style="color:var(--danger)">${counts.password||0}</div></div>
    <div class="stat-card"><div class="stat-label">Commands</div><div class="stat-value" style="color:var(--accent2)">${counts.command||0}</div></div>
    <div class="stat-card"><div class="stat-label">Emails</div><div class="stat-value" style="color:var(--success)">${counts.email||0}</div></div>
    <div class="stat-card"><div class="stat-label">Assets</div><div class="stat-value" style="color:var(--warn)">${counts.asset||0}</div></div>
    <div class="stat-card"><div class="stat-label">Notes</div><div class="stat-value" style="color:var(--text2)">${counts.note||0}</div></div>
  `;

  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');

  if (list.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = list.map(i => `
    <div class="card">
      <div class="card-header">
        <span class="card-cat ${catColors[i.category]}">${catLabels[i.category]}</span>
        <div class="card-actions">
          <button onclick="copyValue('${esc(i.value.replace(/'/g,"\\'").replace(/\n/g,"\\n"))}')" title="Copy">Copy</button>
          <button onclick="editItem('${i.id}')" title="Edit">Edit</button>
          <button class="del" onclick="removeItem('${i.id}')" title="Delete">Del</button>
        </div>
      </div>
      <div class="card-title">${esc(i.title)}</div>
      <div class="card-value">${esc(i.value)}</div>
      <div class="card-meta">
        <span>${i.tags&&i.tags.length?'#'+i.tags.join(' #'):''}</span>
        <span>${fmtDate(i.updatedAt)}</span>
      </div>
    </div>
  `).join('');
}

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function copyValue(val) {
  const text = val.replace(/\\n/g, '\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => fallbackCopy(text));
  } else { fallbackCopy(text); }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('Copied!'); } catch { prompt('Copy:', text); }
  document.body.removeChild(ta);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 1500);
}

function handleSearch() {
  searchQuery = document.getElementById('search-input').value.trim();
  filterCat = document.getElementById('filter-cat').value;
  render();
}

function openModal(editId) {
  document.getElementById('modal-title').textContent = editId ? 'Edit Item' : 'Add Item';
  document.getElementById('modal-submit-btn').textContent = editId ? 'Save' : 'Add';
  document.getElementById('f-edit-id').value = editId || '';
  if (editId) {
    const item = items.find(i => i.id === editId);
    if (item) {
      document.getElementById('f-category').value = item.category;
      document.getElementById('f-title').value = item.title;
      document.getElementById('f-value').value = item.value;
      document.getElementById('f-tags').value = (item.tags||[]).join(', ');
    }
  } else {
    document.getElementById('item-form').reset();
  }
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('f-edit-id').value = '';
}

function handleSubmit(e) {
  e.preventDefault();
  const editId = document.getElementById('f-edit-id').value;
  const category = document.getElementById('f-category').value;
  const title = document.getElementById('f-title').value.trim();
  const value = document.getElementById('f-value').value.trim();
  const tags = document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean);

  if (!title || !value) return;

  if (editId) {
    const idx = items.findIndex(i => i.id === editId);
    if (idx >= 0) {
      items[idx] = { ...items[idx], category, title, value, tags, updatedAt: Date.now() };
    }
  } else {
    items.push({ id: uid(), category, title, value, tags, createdAt: Date.now(), updatedAt: Date.now() });
  }
  save();
  closeModal();
  render();
}

function editItem(id) { openModal(id); }

function removeItem(id) {
  if (!confirm('Delete this item?')) return;
  items = items.filter(i => i.id !== id);
  save();
  render();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function updatePlaceholder() {
  const cat = document.getElementById('f-category').value;
  const val = document.getElementById('f-value');
  const placeholders = { password: 'Enter password...', command: 'Enter command...', email: 'Enter email...', asset: 'Enter asset details...', note: 'Enter notes...' };
  val.placeholder = placeholders[cat] || 'Enter value...';
}

/* ==================== EXPORT / IMPORT ==================== */
function exportData() {
  encrypt(items, masterKey).then(enc => {
    const blob = new Blob([enc], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'securevault-backup-' + new Date().toISOString().split('T')[0] + '.enc';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Encrypted backup exported!');
  });
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(ev) {
    try {
      const data = await decrypt(ev.target.result, masterKey);
      if (data && Array.isArray(data)) {
        items = data;
        save();
        render();
        showToast('Imported ' + data.length + ' items!');
      } else {
        alert('Wrong password or corrupted file');
      }
    } catch { alert('Import failed — wrong password or corrupted file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ==================== LOCK ==================== */
function lockVault() {
  masterKey = null;
  items = [];
  document.getElementById('app').classList.remove('show');
  document.getElementById('lock').classList.remove('hidden');
  document.getElementById('lock-input').value = '';
  document.getElementById('lock-input').focus();
}

/* ==================== INIT ==================== */
(function init() {
  // Particles
  const pc = document.getElementById('lock-particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'lp';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = Math.random() * 5 + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    pc.appendChild(p);
  }

  const input = document.getElementById('lock-input');
  const errEl = document.getElementById('lock-error');
  input.focus();

  input.addEventListener('keydown', async function(e) {
    if (e.key !== 'Enter') return;
    const pw = this.value;
    if (!pw) return;

    if (!hasData()) {
      // First time — set password
      masterKey = pw;
      items = [];
      save();
      this.classList.add('success');
      errEl.textContent = '';
      setTimeout(() => {
        document.getElementById('lock').classList.add('hidden');
        document.getElementById('app').classList.add('show');
        render();
      }, 400);
    } else {
      // Existing — decrypt
      const ok = await load(pw);
      if (ok) {
        masterKey = pw;
        this.classList.add('success');
        errEl.textContent = '';
        setTimeout(() => {
          document.getElementById('lock').classList.add('hidden');
          document.getElementById('app').classList.add('show');
          render();
        }, 400);
      } else {
        this.classList.add('error');
        errEl.textContent = 'Wrong password';
        var self = this;
        setTimeout(() => { self.classList.remove('error'); self.value = ''; self.focus(); errEl.textContent = ''; }, 800);
      }
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('modal-overlay').classList.contains('open')) closeModal();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openModal(); }
  });
})();
</script>
